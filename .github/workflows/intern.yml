name: Run Toxic Comment Classifier

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Pull Docker image
        run: docker pull nithingowdaba/toxic-comment-classifier-ui:latest
      
      - name: Run Docker container
        run: |
          docker run -d -p 7860:7860 --name toxic-classifier nithingowdaba/toxic-comment-classifier-ui:latest
          sleep 10
          
      - name: Verify container is running
        run: docker ps
      
      - name: Check container logs
        run: docker logs toxic-classifier || true
